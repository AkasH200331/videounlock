<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Lock Box - Watch Unlocked Video</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    * { font-family: 'Noto Sans Sinhala', 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; }
 .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(148, 163, 184, 0.1); }
 .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
 .btn-gradient:hover:not(:disabled) { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4); }
 .btn-gradient:disabled { opacity: 0.5; cursor: not-allowed; }
 .ad-btn { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); transition: all 0.3s ease; }
 .ad-btn:hover { background: linear-gradient(135deg, #d97706 0%, #b45309 100%); transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(245, 158, 11, 0.4); }
 .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity:.7; } }
 .progress-bar { transition: width 0.5s ease; }
    #videoModal { backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    video { outline: none; }
    video::-webkit-media-controls-enclosure { border-radius: 12px; }
</style>
</head>
<body class="text-slate-100 flex items-center justify-center p-4">
    <div class="w-full max-w-2xl mx-auto">
        <div class="glass rounded-3xl shadow-2xl overflow-hidden">
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 md:p-8 text-center relative overflow-hidden">
                <div class="absolute inset-0 bg-black opacity-10"></div>
                <div class="relative z-10">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-white/20 rounded-2xl mb-4 backdrop-blur-sm">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <h1 class="text-3xl md:text-4xl font-bold text-white mb-2">Video Lock Box</h1>
                    <p class="text-blue-100 text-sm md:text-base">වීඩියෝව නැරඹීමට පහත පියවර සම්පූර්ණ කරන්න</p>
                </div>
            </div>

            <div class="p-6 md:p-8">
                <div id="statusBox" class="mb-6 p-5 rounded-2xl bg-slate-800/50 border border-slate-700/50">
                    <div class="flex items-start gap-4">
                        <div id="statusIcon" class="flex-shrink-0 w-10 h-10 rounded-xl bg-amber-500/20 flex items-center justify-center">
                            <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                        <div class="flex-1">
                            <h3 id="statusTitle" class="text-lg font-semibold text-white mb-1">Video Locked</h3>
                            <p id="statusText" class="text-slate-400 text-sm">වීඩියෝව Unlock කිරීමට Ad 2ක් click කරන්න</p>
                        </div>
                    </div>
                </div>

                <div id="progressContainer" class="mb-6">
                    <div class="flex justify-between text-xs text-slate-400 mb-2">
                        <span>Unlock Progress</span>
                        <span id="progressText">0/2 Ads</span>
                    </div>
                    <div class="w-full h-2 bg-slate-800 rounded-full overflow-hidden">
                        <div id="progressBar" class="progress-bar h-full bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full" style="width: 0%"></div>
                    </div>
                </div>

                <div id="adButtons" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <button onclick="clickAd(1)" id="adBtn1" class="ad-btn text-white font-semibold py-4 px-6 rounded-xl shadow-lg flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                        </svg>
                        <span>Advertisement 1</span>
                    </button>
                    <button onclick="clickAd(2)" id="adBtn2" class="ad-btn text-white font-semibold py-4 px-6 rounded-xl shadow-lg flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                        </svg>
                        <span>Advertisement 2</span>
                    </button>
                </div>

                <button onclick="watchVideo()" id="watchBtn" disabled class="btn-gradient w-full text-white font-bold py-5 px-6 rounded-xl shadow-lg flex items-center justify-center gap-3 text-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                    <span>Watch Video</span>
                </button>

                <div class="mt-6 p-4 bg-blue-500/10 border border-blue-500/20 rounded-xl">
                    <div class="flex gap-3">
                        <svg class="w-5 h-5 text-blue-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <p class="text-xs text-blue-300 leading-relaxed">
                             කරුණාකර Ad 2ක් click කරන්න. Click කරාම auto unlock වෙනවා.
                        </p>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900/50 px-6 md:px-8 py-4 border-t border-slate-700/50">
                <p class="text-center text-slate-500 text-xs">
                    © 2024 Video Lock Box. All rights reserved.
                </p>
            </div>
        </div>
    </div>

    <div id="videoModal" class="hidden fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4" onclick="closeModalOnBackdrop(event)">
        <div class="relative w-full max-w-5xl bg-slate-900 rounded-2xl shadow-2xl overflow-hidden" onclick="event.stopPropagation()">
            <button onclick="closeVideoModal()" class="absolute top-4 right-4 z-10 w-10 h-10 bg-black/50 hover:bg-black/70 text-white rounded-full flex items-center justify-center transition-all duration-200 backdrop-blur-sm">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            <video id="videoPlayer" class="w-full h-auto max-h-" controls controlsList="nodownload" oncontextmenu="return false" preload="metadata">
                <source src="myvideo.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

<script>
    // ඔයා දුන්න අලුත් Ad Links 2
    const adLinks = [
        "https://assistedtogether.com/gt5ajw9c?key=c218573c529e15944a7e7ef517690d71",
        "https://assistedtogether.com/ewahqp0r2?key=4c8b8d7091e224845683a5e456d1dc64"
    ];
    
    let adsClicked = [false, false];
    let isUnlocked = false;

    window.addEventListener('DOMContentLoaded', () => {
        const stored = localStorage.getItem('videoLockBoxState');
        if (stored) {
            const state = JSON.parse(stored);
            adsClicked = state.adsClicked || [false, false];
            isUnlocked = state.isUnlocked || false;
            updateUI();
        }
    });

    function saveState() {
        localStorage.setItem('videoLockBoxState', JSON.stringify({
            adsClicked: adsClicked,
            isUnlocked: isUnlocked
        }));
    }

    function clickAd(adNum) {
        if (isUnlocked) return;
        
        const adIndex = adNum - 1;
        if (adsClicked[adIndex]) return;

        // Open ad in new tab
        window.open(adLinks[adIndex], '_blank');
        
        // Mark as clicked immediately
        adsClicked[adIndex] = true;
        saveState();
        updateUI();
    }

    function updateUI() {
        const clickedCount = adsClicked.filter(Boolean).length;
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const statusBox = document.getElementById('statusBox');
        const statusIcon = document.getElementById('statusIcon');
        const statusTitle = document.getElementById('statusTitle');
        const statusText = document.getElementById('statusText');
        const watchBtn = document.getElementById('watchBtn');
        const adBtn1 = document.getElementById('adBtn1');
        const adBtn2 = document.getElementById('adBtn2');

        progressBar.style.width = (clickedCount / 2 * 100) + '%';
        progressText.textContent = clickedCount + '/2 Ads';

        if (adsClicked[0]) {
            adBtn1.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg><span>Completed</span>';
            adBtn1.disabled = true;
            adBtn1.classList.remove('ad-btn');
            adBtn1.classList.add('bg-green-600', 'cursor-not-allowed');
        }
        if (adsClicked[1]) {
            adBtn2.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg><span>Completed</span>';
            adBtn2.disabled = true;
            adBtn2.classList.remove('ad-btn');
            adBtn2.classList.add('bg-green-600', 'cursor-not-allowed');
        }

        if (clickedCount === 2) {
            isUnlocked = true;
            saveState();
            
            statusBox.classList.remove('bg-slate-800/50', 'border-slate-700/50');
            statusBox.classList.add('bg-green-500/10', 'border-green-500/20');
            statusIcon.classList.remove('bg-amber-500/20');
            statusIcon.classList.add('bg-green-500/20');
            statusIcon.innerHTML = '<svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
            statusTitle.textContent = 'Video Unlocked!';
            statusTitle.classList.remove('text-white');
            statusTitle.classList.add('text-green-400');
            statusText.textContent = 'Video unlocked! Click to watch';
            statusText.classList.remove('text-slate-400');
            statusText.classList.add('text-green-300');
            
            watchBtn.disabled = false;
            watchBtn.innerHTML = '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span>Watch Video - Unlocked!</span>';
        }
    }

    function watchVideo() {
        if (!isUnlocked) return;
        
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('videoPlayer');
        
        modal.classList.remove('hidden');
        video.play().catch(err => {
            console.log('Video autoplay prevented:', err);
        });
    }

    function closeVideoModal() {
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('videoPlayer');
        
        video.pause();
        video.currentTime = 0;
        modal.classList.add('hidden');
    }

    function closeModalOnBackdrop(event) {
        if (event.target.id === 'videoModal') {
            closeVideoModal();
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            const modal = document.getElementById('videoModal');
            if (!modal.classList.contains('hidden')) {
                e.preventDefault();
                closeVideoModal();
            }
        }
    });
</script>
